<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:linear-gradient(160deg,#0f0c29,#302b63,#24243e);min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;color:#fff;padding-bottom:80px}
.header{padding:32px 20px 16px}
.date-lbl{font-size:12px;opacity:.5;letter-spacing:1.5px;text-transform:uppercase}
.title{font-size:26px;font-weight:800;margin-top:4px}
.ring-box{margin-top:16px;background:rgba(255,255,255,.08);border-radius:20px;padding:16px;display:flex;align-items:center;gap:16px}
.ring-text .big{font-size:20px;font-weight:700}
.ring-text .sub{font-size:13px;opacity:.6}
.ring-text .bravo{font-size:13px;color:#10b981;font-weight:700;margin-top:4px}
.nav-bar{margin-top:12px;background:rgba(255,255,255,.07);border-radius:14px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between}
.nav-btn{background:none;border:none;color:#a78bfa;font-size:26px;cursor:pointer;padding:0 6px;line-height:1}
.nav-btn:disabled{color:rgba(255,255,255,.15);cursor:default}
.nav-center{text-align:center}
.nav-day{font-weight:700;font-size:15px}
.nav-full{font-size:11px;color:rgba(255,255,255,.4);margin-top:1px}
.content{padding:0 16px}
.section-lbl{color:rgba(255,255,255,.45);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;margin-top:4px}
.card{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);border-radius:18px;padding:16px 18px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all .2s}
.card-icon{font-size:22px}
.card-name{font-weight:700;font-size:15px;margin-top:2px}
.card-status{font-size:13px;font-weight:600;margin-top:2px}
.card-streak{font-size:12px;margin-top:2px}
.stepper{display:flex;align-items:center;gap:10px}
.step-btn{width:32px;height:32px;border-radius:50%;border:2px solid;background:transparent;font-weight:900;font-size:20px;cursor:pointer;line-height:1}
.step-val{font-weight:700;font-size:17px;min-width:20px;text-align:center}
.week-circle{width:50px;height:50px;border-radius:50%;border:3px solid rgba(255,255,255,.15);display:flex;flex-direction:column;align-items:center;justify-content:center}
.week-num{font-weight:800;font-size:17px;line-height:1}
.week-denom{color:rgba(255,255,255,.4);font-size:10px}
.week-lbl{color:rgba(255,255,255,.4);font-size:10px;margin-top:4px;text-align:center}
.skin-box{border:2px solid rgba(255,255,255,.12);border-radius:18px;padding:16px 18px;margin-bottom:10px}
.skin-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.skin-slots{display:flex;gap:10px}
.skin-slot{flex:1;border-radius:14px;border:2px solid rgba(255,255,255,.15);padding:12px 0;text-align:center;cursor:pointer;transition:all .2s}
.skin-slot-icon{font-size:26px}
.skin-slot-lbl{font-size:13px;font-weight:600;margin-top:4px}
.skin-slot-status{font-size:12px;color:rgba(255,255,255,.4);margin-top:2px}
.stats-box{background:rgba(255,255,255,.07);border-radius:20px;padding:16px;margin-bottom:14px}
table{width:100%;border-collapse:separate;border-spacing:4px}
th,td{text-align:center;font-size:11px}
.cell{width:26px;height:26px;border-radius:6px;margin:auto;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff}
.bar-row{margin-bottom:14px}
.bar-head{display:flex;justify-content:space-between;margin-bottom:6px;font-size:14px}
.bar-track{background:rgba(255,255,255,.1);border-radius:99px;height:8px}
.bar-fill{border-radius:99px;height:8px;transition:width .6s ease}
.bar-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px}
.streak-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.streak-pill{border-radius:99px;padding:3px 12px;font-weight:700;font-size:13px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,8,40,.95);backdrop-filter:blur(20px);display:flex;justify-content:space-around;padding:12px 0 24px;border-top:1px solid rgba(255,255,255,.08)}
.nav-tab{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;opacity:.35;transition:opacity .2s}
.nav-tab.active{opacity:1}
.nav-tab-icon{font-size:24px}
.nav-tab-lbl{font-size:11px;font-weight:600}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#fff;color:#1e1b4b;border-radius:16px;padding:12px 22px;box-shadow:0 8px 32px rgba(0,0,0,.35);z-index:1000;display:flex;gap:8px;align-items:center;font-weight:700;font-size:15px;white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
#loginScreen{position:fixed;inset:0;background:linear-gradient(160deg,#0f0c29,#302b63,#24243e);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;z-index:2000}
#loginScreen h1{font-size:28px;font-weight:800;margin-bottom:8px}
#loginScreen p{font-size:14px;opacity:.6;margin-bottom:32px;text-align:center}
#loginScreen input{width:100%;padding:14px 16px;border-radius:14px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;font-size:16px;outline:none;margin-bottom:12px}
#loginScreen input::placeholder{color:rgba(255,255,255,.4)}
#loginScreen button{width:100%;padding:16px;border-radius:14px;border:none;background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;font-size:16px;font-weight:700;cursor:pointer}
#loginScreen .sync-status{font-size:12px;opacity:.5;margin-top:16px;text-align:center}
#syncDot{width:8px;height:8px;border-radius:50%;background:#10b981;position:fixed;top:16px;right:16px;z-index:100;transition:background .3s}
#syncDot.syncing{background:#f59e0b}
#syncDot.error{background:#ef4444}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:12px 0}
.calendar-day{width:100%;aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:3000;align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex}
.modal-content{background:linear-gradient(160deg,#0f0c29,#302b63,#24243e);border-radius:20px;padding:24px;max-width:400px;width:100%;border:2px solid rgba(255,255,255,.1)}
.modal-content h2{font-size:20px;margin-bottom:16px}
.modal-content input{width:100%;padding:12px 16px;border-radius:12px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;font-size:14px;outline:none;margin-bottom:12px}
.modal-buttons{display:flex;gap:12px;margin-top:16px}
.modal-buttons button{flex:1;padding:12px;border-radius:12px;border:none;font-weight:700;cursor:pointer}
.modal-buttons .btn-ok{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff}
.modal-buttons .btn-cancel{background:rgba(255,255,255,.1);color:#fff;border:2px solid rgba(255,255,255,.2)}
</style>
</head>
<body>

<div id="loginScreen" style="display: none;">
  <div style="font-size:48px;margin-bottom:16px">🌿</div>
  <h1>Mi Bienestar</h1>
  <p>Introduce tu email para sincronizar tus datos entre todos tus dispositivos</p>
  <input type="email" id="emailInput" placeholder="tu@email.com">

<div class="header">
  <div class="date-lbl" id="todayLabel">martes, 31 de marzo</div>
  <div class="title">Mi Bienestar
    <span id="userEmail" style="font-size:11px;opacity:.4;font-weight:400;margin-left:8px">catana3el@gmail.com (offline)</span>
  </div>
  <div id="ringBox" class="ring-box" style="display: flex;">
    <svg width="72" height="72">
      <circle cx="36" cy="36" r="28" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="7"></circle>
      <circle cx="36" cy="36" r="28" fill="none" stroke="#a78bfa" stroke-width="7" stroke-dasharray="175.9" stroke-dashoffset="124.90972390673016" stroke-linecap="round" transform="rotate(-90 36 36)" id="ringCircle" style="transition:stroke-dashoffset .5s ease"></circle>
      <text x="36" y="41" text-anchor="middle" fill="#fff" font-weight="800" font-size="14" id="ringPct">29%</text>

  <div class="nav-bar" id="dateNav" style="display: flex;">

    <div class="nav-center">
      <div class="nav-day" id="navDay" style="color: rgb(167, 139, 250);">Hoy</div>

</div>

<div class="content" id="mainContent"></div>

<div class="bottom-nav">
  <div class="nav-tab active" id="tab-today" onclick="setView('today')">
    <div class="nav-tab-icon">🌿</div><div class="nav-tab-lbl">Hoy</div>
  </div>

<div class="toast" id="toast"></div>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://evnsxxqgddxuuufmywpj.supabase.co',
  'sb_publishable_ky2MSt6wntdRzKzbFk4Zow_9HF2LFQC'
);

const TODAY = new Date();
function localKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
const TODAY_KEY = localKey(TODAY);
const DAYS = ['L','M','X','J','V','S','D'];

const HABITS=[
  {id:'alcohol',label:'Alcohol',icon:'🍷',type:'bad',color:'#ef4444',unit:'copas'},
  {id:'cafe',label:'Café',icon:'☕',type:'limit',color:'#f97316',unit:'tazas',max:2},
  {id:'medit',label:'Meditación',icon:'🧘',type:'weekly',color:'#8b5cf6',goal:1},
  {id:'yoga',label:'Yoga',icon:'🌿',type:'weekly',color:'#10b981',goal:2},
  {id:'master',label:'Máster',icon:'📚',type:'weekly',color:'#3b82f6',goal:3},
  {id:'cervical',label:'Estiram. cervicales',icon:'🔄',type:'weekly',color:'#f59e0b',goal:4},
  {id:'skincare',label:'Skin Care',icon:'✨',type:'skincare',color:'#ec4899'},
];

let data={alcohol:{},cafe:{},medit:{},yoga:{},master:{},cervical:{},skincare:{},goals:{medit:1,yoga:2,master:3,cervical:4}};
let selKey=TODAY_KEY, view='today', userEmail='', saveTimer=null, subscription=null, isOnline=false;

function getLast7(){return Array.from({length:7},(_,i)=>{const d=new Date(TODAY);d.setDate(TODAY.getDate()-6+i);return localKey(d);});}
function getWeekStart(k){const d=new Date(k+'T12:00:00');const day=d.getDay();d.setDate(d.getDate()+(day===0?-6:1-day));return localKey(d);}
function getWeekKeys(k){const s=getWeekStart(k);return Array.from({length:7},(_,i)=>{const d=new Date(s+'T12:00:00');d.setDate(d.getDate()+i);return localKey(d);});}
function dayLabel(k){const d=new Date(k+'T12:00:00');const i=d.getDay();return DAYS[i===0?6:i-1];}
function getLast30(){return Array.from({length:30},(_,i)=>{const d=new Date(TODAY);d.setDate(TODAY.getDate()-29+i);return localKey(d);});}
function getLast12Months(){const months=[];for(let i=11;i>=0;i--){const d=new Date(TODAY);d.setMonth(d.getMonth()-i);months.push({year:d.getFullYear(),month:d.getMonth()});}return months;}

function login(){
  const email=document.getElementById('emailInput').value.trim().toLowerCase();
  if(!email||!email.includes('@')){
    document.getElementById('loginStatus').textContent='Introduce un email válido';
    return;
  }
  document.getElementById('loginStatus').textContent='Cargando datos...';
  userEmail=email;
  localStorage.setItem('bienestar-email',email);
  loadFromSupabase();
}

async function loadFromSupabase(){
  setSyncDot('syncing');
  try{
    const {data: rows} = await sb
      .from('habit_data')
      .select('*')
      .eq('user_email', userEmail)
      .maybeSingle();
    
    if(rows && rows.data){
      data = JSON.parse(JSON.stringify(rows.data));
    } else {
      for(let i=0;i<10;i++){
        const d=new Date(TODAY);
        d.setDate(TODAY.getDate()-i);
        data.alcohol[localKey(d)]=0;
      }
    }
    
    isOnline=true;
    setSyncDot('ok');
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('userEmail').textContent=userEmail;
    await pushToSupabase();
    render();
    subscribeToChanges();
  } catch(e){
    console.error('Error loading:', e);
    isOnline=false;
    setSyncDot('error');
    try{
      const s=localStorage.getItem('bienestar-v2');
      if(s) data=JSON.parse(s);
    }catch(e2){}
    document.getElementById('loginStatus').textContent='Sin conexión — usando datos locales';
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('userEmail').textContent=userEmail+' (offline)';
    render();
  }
}

function subscribeToChanges(){
  if(!isOnline) return;
  if(subscription) subscription.unsubscribe();
  subscription = sb
    .channel('db-changes-'+userEmail)
    .on('postgres_changes', {event: 'UPDATE', schema: 'public', table: 'habit_data', filter: 'user_email=eq.'+userEmail}, (payload) => {
      if(payload.new && payload.new.data){
        data = JSON.parse(JSON.stringify(payload.new.data));
        render();
      }
    })
    .subscribe();
}

async function pushToSupabase(){
  if(!isOnline) return;
  setSyncDot('syncing');
  try{
    const dataToSave = JSON.parse(JSON.stringify(data));
    const {data: existing} = await sb.from('habit_data').select('id').eq('user_email', userEmail).maybeSingle();
    let error;
    if(existing && existing.id){
      const result = await sb.from('habit_data').update({data: dataToSave, updated_at: new Date().toISOString()}).eq('user_email', userEmail);
      error = result.error;
    } else {
      const result = await sb.from('habit_data').insert({user_email: userEmail, data: dataToSave, updated_at: new Date().toISOString()});
      error = result.error;
    }
    if(error) throw error;
    localStorage.setItem('bienestar-v2', JSON.stringify(data));
    setSyncDot('ok');
  } catch(e){
    console.error('Error saving:', e);
    setSyncDot('error');
    localStorage.setItem('bienestar-v2', JSON.stringify(data));
  }
}

function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>pushToSupabase(),1000);
}

function setSyncDot(state){
  const d=document.getElementById('syncDot');
  d.style.background=state==='ok'?'#10b981':state==='syncing'?'#f59e0b':'#ef4444';
  d.title=state==='ok'?'Sincronizado':state==='syncing'?'Guardando...':'Error';
}

window.onload=function(){
  document.getElementById('todayLabel').textContent=TODAY.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
  const saved=localStorage.getItem('bienestar-email');
  if(saved){
    document.getElementById('emailInput').value=saved;
    userEmail=saved;
    loadFromSupabase();
  }
};

function getNum(id,k){return Number(data[id]?.[k]||0);}
function getBool(id,k){return !!data[id]?.[k];}
function getSkin(k){return data.skincare?.[k]||{am:false,pm:false};}
function weekCount(id){return getWeekKeys(selKey).filter(k=>data[id]?.[k]).length;}
function getGoal(id){return data.goals?.[id]||HABITS.find(h=>h.id===id)?.goal||1;}
function cleanStreak(){let s=0;for(let i=0;i<365;i++){const d=new Date(TODAY);d.setDate(TODAY.getDate()-i);const k=localKey(d);if(data.alcohol?.[k]!==undefined&&Number(data.alcohol[k])===0)s++;else break;}return s;}
function boolStreak(id){let s=0;for(let i=0;i<365;i++){const d=new Date(TODAY);d.setDate(TODAY.getDate()-i);if(data[id]?.[localKey(d)])s++;else break;}return s;}
function skincareStreak(){let s=0;for(let i=0;i<365;i++){const d=new Date(TODAY);d.setDate(TODAY.getDate()-i);const sk=data.skincare?.[localKey(d)]||{};if(sk.am&&sk.pm)s++;else break;}return s;}

function showToast(msg,emoji){const t=document.getElementById('toast');t.innerHTML='<span style="font-size:20px">'+emoji+'</span>'+msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function shiftDay(n){const d=new Date(selKey+'T12:00:00');d.setDate(d.getDate()+n);const k=localKey(d);if(k<=TODAY_KEY){selKey=k;render();}}
function setView(v){view=v;render();}

function render(){
  const isToday=selKey===TODAY_KEY;
  document.getElementById('dateNav').style.display=view==='today'?'flex':'none';
  document.getElementById('ringBox').style.display=view==='today'?'flex':'none';
  document.getElementById('navDay').textContent=isToday?'Hoy':new Date(selKey+'T12:00:00').toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'});
  document.getElementById('navDay').style.color=isToday?'#a78bfa':'#fff';
  const nf=document.getElementById('navFull');
  if(!isToday){nf.style.display='block';nf.textContent=new Date(selKey+'T12:00:00').toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'});}
  else nf.style.display='none';
  document.getElementById('btnNext').disabled=isToday;
  document.getElementById('tab-today').classList.toggle('active',view==='today');
  document.getElementById('tab-stats').classList.toggle('active',view==='stats');
  document.getElementById('tab-reto').classList.toggle('active',view==='reto');
  document.getElementById('tab-config').classList.toggle('active',view==='config');

  const wk=getWeekKeys(TODAY_KEY);
  const scores=[
    getNum('alcohol',TODAY_KEY)===0,
    getNum('cafe',TODAY_KEY)<=1,
    wk.filter(k=>data.medit?.[k]).length>=getGoal('medit'),
    wk.filter(k=>data.yoga?.[k]).length>=getGoal('yoga'),
    wk.filter(k=>data.master?.[k]).length>=getGoal('master'),
    wk.filter(k=>data.cervical?.[k]).length>=getGoal('cervical'),
    getSkin(TODAY_KEY).am&&getSkin(TODAY_KEY).pm,
  ];
  const done=scores.filter(Boolean).length,total=scores.length,pct=Math.round(done/total*100);
  const C=2*Math.PI*28;
  document.getElementById('ringCircle').setAttribute('stroke-dashoffset',C*(1-pct/100));
  document.getElementById('ringCircle').setAttribute('stroke',pct===100?'#10b981':'#a78bfa');
  document.getElementById('ringPct').textContent=pct+'%';
  document.getElementById('ringCount').textContent=done+'/'+total+' objetivos';
  document.getElementById('ringBravo').style.display=pct===100?'block':'none';

  if(view==='today')renderToday();
  else if(view==='stats')renderStats();
  else if(view==='reto')renderReto();
  else renderConfig();
}

function renderToday(){
  const el=document.getElementById('mainContent');
  let h='<div style="display:flex;flex-direction:column;gap:0">';
  h+='<div class="section-lbl">Reducir 📉</div>';
  HABITS.filter(x=>x.type==='bad'||x.type==='limit').forEach(hb=>{
    const val=getNum(hb.id,selKey),isLim=hb.type==='limit';
    let border,bg,sc,btnColor;
    
    if(isLim){
      if(val>hb.max+2){border='#ef4444';bg='rgba(239,68,68,0.10)';sc='#ef4444';btnColor='#ef4444';}
      else if(val>hb.max){border='#f97316';bg='rgba(249,115,22,0.10)';sc='#f97316';btnColor='#f97316';}
      else{border='#10b981';bg='rgba(16,185,129,0.10)';sc='#10b981';btnColor='#10b981';}
    } else {
      if(val>=3){border='#ef4444';bg='rgba(239,68,68,0.10)';sc='#ef4444';btnColor='#ef4444';}
      else if(val>=1){border='#f97316';bg='rgba(249,115,22,0.10)';sc='#f97316';btnColor='#f97316';}
      else{border='#10b981';bg='rgba(16,185,129,0.10)';sc='#10b981';btnColor='#10b981';}
    }
    
    let status=isLim?(val===0?'Sin café hoy ✅':val<=hb.max?val+'/'+hb.max+' tazas hoy ✅':val+' tazas — alerta ⚠️'):(val===0?'Sin alcohol hoy ✅':val+' '+hb.unit+' hoy ⚠️');
    const cs=cleanStreak();
    let streak=!isLim&&cs>=10?'<div class="card-streak" style="color:#fbbf24">🏆 '+cs+' días sin alcohol</div>':(!isLim&&cs>0?'<div class="card-streak" style="color:#10b981">🌟 '+cs+' días — objetivo: 10</div>':'');
    h+=`<div class="card" style="background:${bg};border-color:${border}">
      <div><div class="card-icon">${hb.icon}</div><div class="card-name">${hb.label}</div>
      <div class="card-status" style="color:${sc}">${status}</div>${streak}</div>
      <div class="stepper">
        <button class="step-btn" style="color:${btnColor};border-color:${btnColor}" onclick="changeNum('${hb.id}',${val-1})">−</button>
        <span class="step-val">${val}</span>
        <button class="step-btn" style="color:#fff;background:${btnColor};border-color:${btnColor}" onclick="changeNum('${hb.id}',${val+1})">+</button>
      </div></div>`;
  });
  h+='<div class="section-lbl" style="margin-top:8px">Objetivos semanales 📅</div>';
  HABITS.filter(x=>x.type==='weekly').forEach(hb=>{
    const done=getBool(hb.id,selKey),wc=weekCount(hb.id),goal=getGoal(hb.id),met=wc>=goal;
    const bs=boolStreak(hb.id);
    const sk=bs>1?`<div class="card-streak" style="color:#10b981">🔥 ${bs} días seguidos</div>`:'';
    h+=`<div class="card" style="background:${done?'#10b98125':'rgba(255,255,255,0.07)'};border-color:${done?'#10b981':'rgba(255,255,255,0.12)'}" onclick="toggleBool('${hb.id}')">
      <div><div class="card-icon">${hb.icon}</div><div class="card-name">${hb.label}</div>
      <div class="card-status" style="color:${done?'#10b981':'rgba(255,255,255,.45)'}">${done?'Hecho ✅':'Pendiente'}</div>${sk}</div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        <div class="week-circle" style="border-color:${met?'#10b981':'rgba(255,255,255,.15)'};background:${met?'#10b98130':'transparent'}">
          <span class="week-num" style="color:${met?'#10b981':'rgba(255,255,255,.6)'}">${wc}</span>
          <span class="week-denom">/${goal}</span>
        </div><span class="week-lbl">esta semana</span>
      </div></div>`;
  });
  const skin=getSkin(selKey),both=skin.am&&skin.pm,hb=HABITS.find(x=>x.id==='skincare'),ss=skincareStreak();
  h+=`<div class="section-lbl" style="margin-top:8px">Rutina diaria ✨</div>
  <div class="skin-box" style="background:${both?hb.color+'25':'rgba(255,255,255,0.07)'};border-color:${both?hb.color:'rgba(255,255,255,0.12)'}">
    <div class="skin-header"><span style="font-size:22px">✨</span><span style="font-weight:700;font-size:15px">Skin Care</span>
    ${both?`<span style="font-size:13px;color:${hb.color};font-weight:700;margin-left:auto">Completo ✅</span>`:''}</div>
    <div class="skin-slots">
      <div class="skin-slot" style="border-color:${skin.am?hb.color:'rgba(255,255,255,.15)'};background:${skin.am?hb.color+'30':'transparent'}" onclick="toggleSkin('am')">
        <div class="skin-slot-icon">🌅</div><div class="skin-slot-lbl">Mañana</div>
        <div class="skin-slot-status" style="color:${skin.am?hb.color:'rgba(255,255,255,.4)'}">${skin.am?'✓ Hecho':'Pendiente'}</div>
      </div>
      <div class="skin-slot" style="border-color:${skin.pm?hb.color:'rgba(255,255,255,.15)'};background:${skin.pm?hb.color+'30':'transparent'}" onclick="toggleSkin('pm')">
        <div class="skin-slot-icon">🌙</div><div class="skin-slot-lbl">Noche</div>
        <div class="skin-slot-status" style="color:${skin.pm?hb.color:'rgba(255,255,255,.4)'}">${skin.pm?'✓ Hecho':'Pendiente'}</div>
      </div>
    </div>
    ${ss>1?`<div style="font-size:12px;color:${hb.color};margin-top:10px;text-align:center">🔥 ${ss} días con rutina completa</div>`:''}
  </div></div>`;
  el.innerHTML=h;
}

function renderStats(){
  const el=document.getElementById('mainContent'),last7=getLast7();
  let h='<div style="display:flex;flex-direction:column;gap:0">';
  h+='<div class="stats-box"><div class="section-lbl">Últimos 7 días</div><div style="overflow-x:auto"><table><thead><tr><td style="width:88px"></td>';
  last7.forEach(k=>{h+=`<th style="color:${k===TODAY_KEY?'#a78bfa':'rgba(255,255,255,.45)'};font-weight:${k===TODAY_KEY?700:400};padding-bottom:6px">${dayLabel(k)}</th>`;});
  h+='</tr></thead><tbody>';
  HABITS.filter(x=>x.type!=='skincare').forEach(hb=>{
    h+=`<tr><td style="font-size:11px;color:rgba(255,255,255,.7);padding-right:4px;white-space:nowrap">${hb.icon} ${hb.label}</td>`;
    last7.forEach(k=>{
      let bg,txt;
      if(hb.type==='bad'){
        const v=getNum(hb.id,k);
        if(v>=3)bg='#ef4444';
        else if(v>=1)bg='#f97316';
        else bg='#10b981';
        txt=v===0?'✓':v||'–';
      }
      else if(hb.type==='limit'){
        const v=getNum(hb.id,k);
        if(v>hb.max+2)bg='#ef4444';
        else if(v>hb.max)bg='#f97316';
        else if(v===0)bg='rgba(255,255,255,.08)';
        else bg='#10b981';
        txt=v===0?'–':v;
      }
      else{const d=getBool(hb.id,k);bg=d?'#10b981':'rgba(255,255,255,.08)';txt=d?'✓':'–';}
      h+=`<td><div class="cell" style="background:${bg}">${txt}</div></td>`;
    });h+='</tr>';
  });
  h+='<tr><td style="font-size:11px;color:rgba(255,255,255,.7);padding-right:4px">✨ Skin Care</td>';
  last7.forEach(k=>{const sk=getSkin(k),both=sk.am&&sk.pm,one=sk.am||sk.pm;h+=`<td><div class="cell" style="background:${both?'#ec4899':one?'#ec489966':'rgba(255,255,255,.08)'}">${both?'✓':one?'½':'–'}</div></td>`;});
  h+='</tr></tbody></table></div></div>';
  
  h+='<div class="stats-box"><div class="section-lbl">Calendario últimos 30 días</div>';
  const last30=getLast30();
  h+='<div class="calendar-grid" style="grid-template-columns:repeat(10,1fr);gap:2px">';
  last30.forEach(k=>{
    const meditDone=data.medit?.[k]?1:0,yogaDone=data.yoga?.[k]?1:0,masterDone=data.master?.[k]?1:0,cervicalDone=data.cervical?.[k]?1:0;
    const completed=meditDone+yogaDone+masterDone+cervicalDone;
    const color=completed===0?'rgba(255,255,255,.08)':completed===1?'#10b98133':completed===2?'#10b98166':completed===3?'#10b98199':'#10b981';
    h+=`<div class="calendar-day" style="background:${color};width:100%;aspect-ratio:1;border-radius:3px;font-size:7px;padding:1px">${new Date(k+'T12:00:00').getDate()}</div>`;
  });
  h+='</div></div>';
  
  h+='<div class="stats-box"><div class="section-lbl">Comparativa: Este mes vs Mes pasado</div>';
  const thisMonth=new Date(TODAY).getMonth();const thisYear=new Date(TODAY).getFullYear();
  const thisMonthDays=Array.from({length:new Date(thisYear,thisMonth+1,0).getDate()},(_,i)=>{const d=new Date(thisYear,thisMonth,i+1);return localKey(d);});
  const lastMonthDays=Array.from({length:new Date(thisYear,thisMonth,0).getDate()},(_,i)=>{const d=new Date(thisYear,thisMonth-1,i+1);return localKey(d);});
  
  HABITS.filter(x=>x.type==='weekly').forEach(hb=>{
    const thisCount=thisMonthDays.filter(k=>data[hb.id]?.[k]).length;
    const lastCount=lastMonthDays.filter(k=>data[hb.id]?.[k]).length;
    const maxV=Math.max(thisCount,lastCount,1);
    const pThis=Math.round(thisCount/maxV*100),pLast=Math.round(lastCount/maxV*100);
    const diff=thisCount-lastCount;
    const diffColor=diff>0?'#10b981':diff<0?'rgba(255,255,255,.5)':'rgba(255,255,255,.5)';
    const diffTxt=diff>0?`+${diff}`:diff<0?`${diff}`:'=';
    h+=`<div class="bar-row"><div class="bar-head"><span>${hb.icon} ${hb.label}</span></div>
    <div style="display:flex;gap:8px;align-items:center">
      <div style="flex:1">
        <div style="font-size:11px;color:rgba(255,255,255,.5);margin-bottom:3px">Este mes</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pThis}%;background:#10b981"></div></div>
        <div style="font-size:12px;font-weight:700;margin-top:3px">${thisCount}</div>
      </div>
      <div style="flex:1">
        <div style="font-size:11px;color:rgba(255,255,255,.5);margin-bottom:3px">Mes pasado</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pLast}%;background:rgba(255,255,255,.2)"></div></div>
        <div style="font-size:12px;font-weight:700;margin-top:3px">${lastCount}</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:13px;font-weight:700;color:${diffColor}">${diffTxt}</div>
      </div>
    </div></div>`;
  });
  h+='</div></div>';
  el.innerHTML=h;
}

function renderReto(){
  const el=document.getElementById('mainContent');
  let h='<div style="display:flex;flex-direction:column;gap:0">';
  h+='<div class="stats-box"><div class="section-lbl">🏆 Modo Reto</div>';
  h+='<div style="font-size:14px;opacity:.7;margin-bottom:16px">Bate tu propio récord y consigue rachas épicas</div>';
  
  HABITS.filter(x=>x.type==='weekly').forEach(hb=>{
    const s=boolStreak(hb.id);
    const personalRecord=Math.ceil(getGoal(hb.id)*4);
    const progress=Math.min(100,Math.round(s/personalRecord*100));
    h+=`<div class="bar-row" style="background:rgba(255,255,255,.05);padding:12px;border-radius:12px;margin-bottom:10px">
      <div class="bar-head">
        <span style="font-weight:700">${hb.icon} ${hb.label}</span>
        <span style="color:${s>=personalRecord?'#fbbf24':'#10b981'};font-weight:700">${s} días</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${progress}%;background:${hb.color}"></div></div>
      <div style="font-size:12px;color:rgba(255,255,255,.6);margin-top:6px">Objetivo personal: ${personalRecord} días | ${s>=personalRecord?'🏆 ¡RECORD!':'En progreso'}</div>
    </div>`;
  });
  
  h+='</div><div class="stats-box"><div class="section-lbl">📈 Rachas Actuales</div>';
  const cs=cleanStreak();
  h+=`<div class="streak-row"><span style="font-size:14px;opacity:.85">🍷 Sin alcohol</span>
    <span class="streak-pill" style="background:${cs>=10?'#fbbf2430':'#ef444455'};color:${cs>=10?'#fbbf24':'#ef4444'}">${cs>=10?'🏆 '+cs+' días':''+cs+' días'}</span></div>`;
  HABITS.filter(x=>x.type==='weekly').forEach(hb=>{
    const s=boolStreak(hb.id);
    h+=`<div class="streak-row"><span style="font-size:14px;opacity:.85">${hb.icon} ${hb.label}</span>
      <span class="streak-pill" style="background:${s>0?hb.color+'30':'rgba(255,255,255,.07)'};color:${s>0?hb.color:'rgba(255,255,255,.35)'}">${s>0?'🔥 '+s+' días':'—'}</span></div>`;
  });
  h+='</div></div>';
  el.innerHTML=h;
}

function renderConfig(){
  const el=document.getElementById('mainContent');
  let h='<div style="display:flex;flex-direction:column;gap:12px">';
  h+='<div style="background:rgba(255,255,255,.07);border-radius:20px;padding:20px"><div class="section-lbl" style="margin-bottom:12px">Metas Personalizadas</div>';
  HABITS.filter(x=>x.type==='weekly').forEach(hb=>{
    const goal=getGoal(hb.id);
    h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:12px;background:rgba(255,255,255,.05);border-radius:12px">
      <span style="font-weight:700">${hb.icon} ${hb.label}</span>
      <button onclick="openGoalModal('${hb.id}','${hb.label}',${goal})" style="padding:6px 12px;border-radius:8px;border:2px solid #10b981;background:transparent;color:#10b981;font-weight:700;cursor:pointer">${goal}/sem</button>
    </div>`;
  });
  if(data.customHabits && Object.keys(data.customHabits).length>0){
    h+='<div style="margin-top:12px;border-top:1px solid rgba(255,255,255,.1);padding-top:12px"><div style="font-size:12px;color:rgba(255,255,255,.5);margin-bottom:8px">METAS ADICIONALES</div>';
    Object.entries(data.customHabits).forEach(([id,habit])=>{
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:8px;background:rgba(255,255,255,.02);border-radius:8px;border-left:3px solid #a78bfa">
        <span style="font-weight:600;font-size:14px">${habit.name}</span>
        <button onclick="deleteCustomHabit('${id}')" style="padding:4px 8px;border-radius:6px;border:none;background:#ef444433;color:#ef4444;font-weight:700;cursor:pointer;font-size:12px">Eliminar</button>
      </div>`;
    });
    h+='</div>';
  }
  h+='<button onclick="addCustomHabit()" style="width:100%;padding:12px;border-radius:12px;border:2px solid #a78bfa;background:transparent;color:#a78bfa;font-weight:700;cursor:pointer;margin-top:12px">+ Añadir Meta Personalizada</button>';
  h+='</div>';
  h+='<div style="background:rgba(255,255,255,.07);border-radius:20px;padding:20px"><div class="section-lbl" style="margin-bottom:12px">Exportar Datos</div>';
  h+='<button onclick="exportData()" style="width:100%;padding:12px;border-radius:12px;border:2px solid #a78bfa;background:transparent;color:#a78bfa;font-weight:700;cursor:pointer;margin-bottom:12px">📥 Descargar JSON</button>';
  h+='<button onclick="exportCSV()" style="width:100%;padding:12px;border-radius:12px;border:2px solid #3b82f6;background:transparent;color:#3b82f6;font-weight:700;cursor:pointer">📊 Descargar CSV</button>';
  h+='</div><div style="background:rgba(255,255,255,.07);border-radius:20px;padding:20px"><div class="section-lbl" style="margin-bottom:12px">Cuenta</div>';
  h+=`<div style="font-size:14px;opacity:.7;margin-bottom:16px">Conectado como:<br><strong style="color:#a78bfa">${userEmail}</strong></div>
  <button onclick="logout()" style="width:100%;padding:12px;border-radius:12px;border:2px solid #ef4444;background:transparent;color:#ef4444;font-weight:700;cursor:pointer">Cerrar sesión</button></div></div>`;
  el.innerHTML=h;
}

function openGoalModal(id,label,current){
  document.getElementById('modalTitle').textContent=`Meta para ${label}`;
  document.getElementById('modalInput').type='number';
  document.getElementById('modalInput').placeholder='Meta';
  document.getElementById('modalInput').value=current;
  document.getElementById('modalInput').dataset.habitId=id;
  document.getElementById('editModal').classList.add('show');
}

function closeModal(){
  document.getElementById('editModal').classList.remove('show');
}

function saveModalGoal(){
  const habitId=document.getElementById('modalInput').dataset.habitId;
  const inputVal=document.getElementById('modalInput').value;
  
  if(habitId==='custom'){
    if(!inputVal.trim()){
      showToast('Escribe un nombre para el hábito','⚠️');
      return;
    }
    if(!data.customHabits)data.customHabits={};
    const customId='custom_'+Date.now();
    data.customHabits[customId]={name:inputVal,goal:1,created:new Date().toISOString()};
    showToast('Meta personalizada añadida','✅');
  } else {
    const newGoal=parseInt(inputVal)||1;
    if(!data.goals)data.goals={};
    data.goals[habitId]=Math.max(1,Math.min(10,newGoal));
    showToast('Meta actualizada','✅');
  }
  
  localStorage.setItem('bienestar-v2', JSON.stringify(data));
  scheduleSave();
  closeModal();
  render();
}

function addCustomHabit(){
  document.getElementById('modalTitle').textContent='Añadir Meta Personalizada';
  document.getElementById('modalInput').type='text';
  document.getElementById('modalInput').placeholder='Nombre del hábito';
  document.getElementById('modalInput').value='';
  document.getElementById('modalInput').dataset.habitId='custom';
  document.getElementById('editModal').classList.add('show');
}

function exportData(){
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`bienestar-${TODAY_KEY}.json`;
  a.click();
  showToast('Datos exportados','📥');
}

function exportCSV(){
  const last30=getLast30();
  let csv='Fecha,Alcohol,Cafe,Meditacion,Yoga,Master,Estiramientos,Skincare\r\n';
  last30.forEach(k=>{
    const a=getNum('alcohol',k);
    const c=getNum('cafe',k);
    const m=getBool('medit',k)?1:0;
    const y=getBool('yoga',k)?1:0;
    const ma=getBool('master',k)?1:0;
    const ce=getBool('cervical',k)?1:0;
    const sk=(getSkin(k).am&&getSkin(k).pm)?2:(getSkin(k).am||getSkin(k).pm)?1:0;
    csv+=`${k},${a},${c},${m},${y},${ma},${ce},${sk}\r\n`;
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const link=document.createElement('a');
  const url=URL.createObjectURL(blob);
  link.setAttribute('href',url);
  link.setAttribute('download',`bienestar-${TODAY_KEY}.csv`);
  link.style.visibility='hidden';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  showToast('CSV exportado','📊');
}

function logout(){
  localStorage.removeItem('bienestar-email');
  if(subscription)subscription.unsubscribe();
  location.reload();
}

function changeNum(id,val){
  if(val<0)val=0;
  if(!data[id])data[id]={};
  data[id][selKey]=val;
  scheduleSave();
  if(id==='alcohol'&&val===0)showToast('¡Sin alcohol hoy!','🌟');
  render();
}

function toggleBool(id){
  const next=!getBool(id,selKey);
  if(!data[id])data[id]={};
  data[id][selKey]=next;
  scheduleSave();
  const hb=HABITS.find(x=>x.id===id);
  if(next)showToast('¡'+hb.label+' completado!',hb.icon);
  render();
}

function toggleSkin(slot){
  const prev=getSkin(selKey);
  if(!data.skincare[selKey])data.skincare[selKey]={am:false,pm:false};
  data.skincare[selKey][slot]=!prev[slot];
  scheduleSave();
  if(!prev[slot])showToast('Skin care '+(slot==='am'?'mañana':'noche')+' ✔','✨');
  render();
}
</script>

</body></html>
