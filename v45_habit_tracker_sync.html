<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<title>Mi Bienestar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(160deg,#0f0c29,#302b63,#24243e);min-height:100vh;font-family:system-ui;color:#fff;padding-bottom:80px}
.hidden{display:none!important}
#login{position:fixed;inset:0;background:linear-gradient(160deg,#0f0c29,#302b63,#24243e);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;z-index:2000}
#login h1{font-size:28px;font-weight:800;margin:16px 0}
#login input{width:100%;max-width:300px;padding:14px 16px;border-radius:12px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;font-size:16px;outline:none;margin-bottom:12px}
#login button{width:100%;max-width:300px;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;font-weight:700;cursor:pointer;font-size:16px}
.header{padding:32px 20px 16px}
.title{font-size:26px;font-weight:800}
.card{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);border-radius:18px;padding:16px 18px;margin:10px 16px;display:flex;justify-content:space-between;align-items:center}
.stepper{display:flex;align-items:center;gap:10px}
.step-btn{width:32px;height:32px;border-radius:50%;border:2px solid;background:transparent;font-weight:900;font-size:18px;cursor:pointer}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,8,40,.95);display:flex;justify-content:space-around;padding:12px 0 24px;border-top:1px solid rgba(255,255,255,.08)}
.nav-tab{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;opacity:.35}
.nav-tab.active{opacity:1}
.content{padding:0 16px 80px}
#syncDot{width:8px;height:8px;border-radius:50%;background:#10b981;position:fixed;top:16px;right:16px;z-index:100}
</style>
</head>
<body>

<div id="login">
  <div style="font-size:48px;margin-bottom:16px">🌿</div>
  <h1>Mi Bienestar</h1>
  <p style="opacity:.6;margin-bottom:32px;text-align:center">Introduce tu email para sincronizar</p>
  <input type="email" id="emailInput" placeholder="tu@email.com">
  <button onclick="doLogin()">Entrar</button>
</div>

<div id="syncDot"></div>

<div class="header hidden" id="header">
  <div class="title">Mi Bienestar
    <span id="userEmail" style="font-size:11px;opacity:.4;margin-left:8px"></span>
  </div>
</div>

<div class="content hidden" id="content"></div>

<div class="bottom-nav hidden" id="nav">
  <div class="nav-tab active" onclick="view='today';render()">🌿 Hoy</div>
  <div class="nav-tab" onclick="view='stats';render()">📊 Stats</div>
  <div class="nav-tab" onclick="view='reto';render()">🏆 Reto</div>
  <div class="nav-tab" onclick="view='config';render()">⚙️ Config</div>
</div>

<script>
const {createClient}=supabase;
const sb=createClient('https://evnsxxqgddxuuufmywpj.supabase.co','sb_publishable_ky2MSt6wntdRzKzbFk4Zow_9HF2LFQC');
const TODAY=new Date();
function localKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
const TODAY_KEY=localKey(TODAY);
const HABITS=[
  {id:'alcohol',label:'Alcohol',icon:'🍷',type:'bad',unit:'copas'},
  {id:'cafe',label:'Café',icon:'☕',type:'limit',unit:'tazas',max:2},
  {id:'medit',label:'Meditación',icon:'🧘',type:'weekly',goal:1},
  {id:'yoga',label:'Yoga',icon:'🌿',type:'weekly',goal:2},
  {id:'master',label:'Máster',icon:'📚',type:'weekly',goal:3},
  {id:'cervical',label:'Estiram. cervicales',icon:'🔄',type:'weekly',goal:4},
  {id:'skincare',label:'Skin Care',icon:'✨',type:'skincare'},
];
let data={alcohol:{},cafe:{},medit:{},yoga:{},master:{},cervical:{},skincare:{},goals:{medit:1,yoga:2,master:3,cervical:4}};
let userEmail='',view='today',saveTimer=null,isOnline=false;

function doLogin(){
  const email=document.getElementById('emailInput').value.trim().toLowerCase();
  if(!email||!email.includes('@'))return;
  userEmail=email;
  localStorage.setItem('bienestar-email',email);
  loadData();
}

async function loadData(){
  document.getElementById('syncDot').style.background='#f59e0b';
  try{
    const {data:rows}=await sb.from('habit_data').select('*').eq('user_email',userEmail).maybeSingle();
    if(rows?.data)data=JSON.parse(JSON.stringify(rows.data));
    else{for(let i=0;i<10;i++){const d=new Date(TODAY);d.setDate(TODAY.getDate()-i);data.alcohol[localKey(d)]=0;}}
    isOnline=true;
    document.getElementById('syncDot').style.background='#10b981';
  }catch(e){
    console.error(e);
    isOnline=false;
    try{const s=localStorage.getItem('bienestar-v2');if(s)data=JSON.parse(s);}catch(e2){}
    document.getElementById('syncDot').style.background='#ef4444';
  }
  document.getElementById('login').classList.add('hidden');
  document.getElementById('header').classList.remove('hidden');
  document.getElementById('content').classList.remove('hidden');
  document.getElementById('nav').classList.remove('hidden');
  document.getElementById('userEmail').textContent=userEmail+(isOnline?'':' (offline)');
  render();
}

async function saveData(){
  if(!isOnline)return;
  document.getElementById('syncDot').style.background='#f59e0b';
  try{
    const {data:existing}=await sb.from('habit_data').select('id').eq('user_email',userEmail).maybeSingle();
    if(existing?.id){
      await sb.from('habit_data').update({data:data,updated_at:new Date().toISOString()}).eq('user_email',userEmail);
    }else{
      await sb.from('habit_data').insert({user_email:userEmail,data:data,updated_at:new Date().toISOString()});
    }
    localStorage.setItem('bienestar-v2',JSON.stringify(data));
    document.getElementById('syncDot').style.background='#10b981';
  }catch(e){document.getElementById('syncDot').style.background='#ef4444';}
}

function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveData,1000);}
function getNum(id,k){return Number(data[id]?.[k]||0);}
function getBool(id,k){return !!data[id]?.[k];}
function getSkin(k){return data.skincare?.[k]||{am:false,pm:false};}
function getGoal(id){return data.goals?.[id]||1;}
function boolStreak(id){let s=0;for(let i=0;i<365;i++){const d=new Date(TODAY);d.setDate(TODAY.getDate()-i);if(data[id]?.[localKey(d)])s++;else break;}return s;}

window.onload=()=>{
  const saved=localStorage.getItem('bienestar-email');
  if(saved){document.getElementById('emailInput').value=saved;}
};

function render(){
  let html='';
  if(view==='today'){
    HABITS.filter(x=>x.type==='bad'||x.type==='limit').forEach(hb=>{
      const val=getNum(hb.id,TODAY_KEY),isLim=hb.type==='limit';
      let border,bg,sc,btnColor;
      if(isLim){
        if(val>hb.max+2){border='#ef4444';bg='rgba(239,68,68,0.10)';sc='#ef4444';btnColor='#ef4444';}
        else if(val>hb.max){border='#f97316';bg='rgba(249,115,22,0.10)';sc='#f97316';btnColor='#f97316';}
        else{border='#10b981';bg='rgba(16,185,129,0.10)';sc='#10b981';btnColor='#10b981';}
      }else{
        if(val>=3){border='#ef4444';bg='rgba(239,68,68,0.10)';sc='#ef4444';btnColor='#ef4444';}
        else if(val>=1){border='#f97316';bg='rgba(249,115,22,0.10)';sc='#f97316';btnColor='#f97316';}
        else{border='#10b981';bg='rgba(16,185,129,0.10)';sc='#10b981';btnColor='#10b981';}
      }
      html+=`<div class="card" style="background:${bg};border-color:${border}"><div><div style="font-size:22px">${hb.icon}</div><div style="font-weight:700;font-size:15px">${hb.label}</div><div style="font-size:13px;color:${sc}">${val} ${hb.unit}</div></div><div class="stepper"><button class="step-btn" style="color:${btnColor};border-color:${btnColor}" onclick="changeNum('${hb.id}',${val-1})">−</button><span style="font-weight:700;font-size:17px">${val}</span><button class="step-btn" style="color:#fff;background:${btnColor};border-color:${btnColor}" onclick="changeNum('${hb.id}',${val+1})">+</button></div></div>`;
    });
    HABITS.filter(x=>x.type==='weekly').forEach(hb=>{
      const done=getBool(hb.id,TODAY_KEY);
      html+=`<div class="card" style="background:${done?'#10b98125':'rgba(255,255,255,0.07)'};border-color:${done?'#10b981':'rgba(255,255,255,0.12)'}" onclick="toggleBool('${hb.id}')"><div><div style="font-size:22px">${hb.icon}</div><div style="font-weight:700;font-size:15px">${hb.label}</div><div style="color:${done?'#10b981':'rgba(255,255,255,.45)'}">${done?'Hecho ✅':'Pendiente'}</div></div></div>`;
    });
  }else if(view==='reto'){
    const cs=function(){let s=0;for(let i=0;i<365;i++){const d=new Date(TODAY);d.setDate(TODAY.getDate()-i);const k=localKey(d);if(data.alcohol?.[k]!==undefined&&Number(data.alcohol[k])===0)s++;else break;}return s;}();
    html+=`<div class="card"><div><div style="font-size:18px">🍷 Sin alcohol</div><div style="color:#10b981;font-weight:700">🔥 ${cs} días</div></div></div>`;
    HABITS.filter(x=>x.type==='weekly').forEach(hb=>{
      const s=boolStreak(hb.id);
      html+=`<div class="card"><div><div style="font-size:18px">${hb.icon} ${hb.label}</div><div style="color:#10b981;font-weight:700">🔥 ${s} días</div></div></div>`;
    });
  }else if(view==='config'){
    HABITS.filter(x=>x.type==='weekly').forEach(hb=>{
      const goal=getGoal(hb.id);
      html+=`<div class="card"><span style="font-weight:700">${hb.icon} ${hb.label}</span><button onclick="setGoal('${hb.id}',${goal})" style="padding:6px 12px;border-radius:8px;border:2px solid #10b981;background:transparent;color:#10b981;font-weight:700;cursor:pointer">${goal}/sem</button></div>`;
    });
    html+=`<div class="card"><button onclick="logoutFunc()" style="width:100%;padding:12px;border:2px solid #ef4444;background:transparent;color:#ef4444;font-weight:700;cursor:pointer;border-radius:12px">Cerrar sesión</button></div>`;
  }
  document.getElementById('content').innerHTML=html;
}

function changeNum(id,val){
  if(val<0)val=0;
  if(!data[id])data[id]={};
  data[id][TODAY_KEY]=val;
  scheduleSave();
  render();
}

function toggleBool(id){
  const next=!getBool(id,TODAY_KEY);
  if(!data[id])data[id]={};
  data[id][TODAY_KEY]=next;
  scheduleSave();
  render();
}

function setGoal(id,current){
  const newGoal=prompt(`Meta para ${HABITS.find(h=>h.id===id).label}:`,current);
  if(newGoal){
    if(!data.goals)data.goals={};
    data.goals[id]=Math.max(1,Math.min(10,parseInt(newGoal)||1));
    scheduleSave();
    render();
  }
}

function logoutFunc(){
  localStorage.removeItem('bienestar-email');
  location.reload();
}
</script>

</body></html>
