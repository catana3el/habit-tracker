<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<title>Mi Bienestar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(160deg,#0f0c29,#302b63,#24243e);min-height:100vh;font-family:system-ui;color:#fff;padding-bottom:80px}
.hidden{display:none!important}
#login{position:fixed;inset:0;background:linear-gradient(160deg,#0f0c29,#302b63,#24243e);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;z-index:2000}
#login h1{font-size:28px;font-weight:800;margin:16px 0}
#login input{width:100%;max-width:300px;padding:14px 16px;border-radius:12px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;font-size:16px;outline:none;margin-bottom:12px}
#login button{width:100%;max-width:300px;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff;font-weight:700;cursor:pointer;font-size:16px}
.header{padding:24px 20px 8px}
.title{font-size:24px;font-weight:800}
.date-nav{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 4px}
.date-nav button{background:rgba(255,255,255,.1);border:none;color:#fff;font-size:22px;width:36px;height:36px;border-radius:50%;cursor:pointer}
.date-nav button:disabled{opacity:.2;cursor:default}
.card{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);border-radius:18px;padding:16px 18px;margin:8px 16px;display:flex;justify-content:space-between;align-items:center}
.stepper{display:flex;align-items:center;gap:10px}
.step-btn{width:32px;height:32px;border-radius:50%;border:2px solid;background:transparent;font-weight:900;font-size:18px;cursor:pointer;line-height:1}
/* Skincare */
.skin-card{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);border-radius:18px;padding:16px 18px;margin:8px 16px}
.skin-row{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.skin-btn{flex:1;padding:9px 0;border-radius:10px;border:2px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.5);font-weight:700;cursor:pointer;font-size:13px;transition:all .2s;margin:0 3px}
.skin-btn.done{border-color:#a78bfa;background:rgba(167,139,250,.15);color:#a78bfa}
/* Stats */
.stat-card{background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);border-radius:18px;padding:14px 18px;margin:6px 16px}
.section-label{padding:10px 16px 2px;font-size:11px;font-weight:700;opacity:.4;letter-spacing:.08em;text-transform:uppercase}
.prog-bg{height:6px;background:rgba(255,255,255,.1);border-radius:3px;margin-top:8px}
.prog-fill{height:6px;border-radius:3px;transition:width .5s}
/* Comparison */
.cmp-row{display:flex;gap:8px;margin-top:10px}
.cmp-col{flex:1;text-align:center;background:rgba(255,255,255,.05);border-radius:10px;padding:8px 4px}
.cmp-val{font-size:20px;font-weight:800}
.cmp-label{font-size:10px;opacity:.5;margin-top:2px}
.cmp-delta{font-size:12px;font-weight:700;margin-top:2px}
/* Nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,8,40,.95);display:flex;justify-content:space-around;padding:10px 0 22px;border-top:1px solid rgba(255,255,255,.08)}
.nav-tab{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;opacity:.35;font-size:10px}
.nav-tab.active{opacity:1}
.content{padding:0 0 80px}
#syncDot{width:8px;height:8px;border-radius:50%;background:#f59e0b;position:fixed;top:16px;right:16px;z-index:100;transition:background .3s}
#errorBanner{position:fixed;top:28px;left:12px;right:28px;background:#7f1d1d;border:1px solid #ef4444;border-radius:10px;padding:10px 14px;font-size:12px;z-index:200;display:none;word-break:break-all}
</style>
</head>
<body>

<div id="login">
  <div style="font-size:48px;margin-bottom:16px">🌿</div>
  <h1>Mi Bienestar</h1>
  <p style="opacity:.6;margin-bottom:32px;text-align:center">Introduce tu email para sincronizar</p>
  <input type="email" id="emailInput" placeholder="tu@email.com">
  <button onclick="doLogin()">Entrar</button>
</div>

<div id="syncDot"></div>
<div id="errorBanner"></div>

<div class="header hidden" id="header">
  <div class="title">Mi Bienestar
    <span id="userEmail" style="font-size:11px;opacity:.4;margin-left:8px"></span>
  </div>
</div>

<div class="content hidden" id="content"></div>

<div class="bottom-nav hidden" id="nav">
  <div class="nav-tab active" onclick="setView('today')"><span style="font-size:20px">🌿</span>Hoy</div>
  <div class="nav-tab" onclick="setView('stats')"><span style="font-size:20px">📊</span>Stats</div>
  <div class="nav-tab" onclick="setView('reto')"><span style="font-size:20px">🏆</span>Reto</div>
  <div class="nav-tab" onclick="setView('config')"><span style="font-size:20px">⚙️</span>Config</div>
</div>

<script>
const {createClient}=supabase;
const sb=createClient(
  'https://evnsxxqgddxuuufmywpj.supabase.co',
  'sb_publishable_ky2MSt6wntdRzKzbFk4Zow_9HF2LFQC'
);

const TODAY=new Date();TODAY.setHours(0,0,0,0);
let activeDate=new Date(TODAY);

const DAYS=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const MONTHS=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

function localKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function sameDay(a,b){return localKey(a)===localKey(b);}
function daysAgo(d){return Math.round((TODAY-d)/86400000);}
function fmtDate(d){const a=daysAgo(d);if(a===0)return'Hoy';if(a===1)return'Ayer';return DAYS[d.getDay()]+', '+d.getDate()+' de '+MONTHS[d.getMonth()];}

const HABITS=[
  {id:'alcohol',label:'Alcohol',icon:'🍷',type:'bad',unit:'copas'},
  {id:'cafe',label:'Café',icon:'☕',type:'limit',unit:'tazas',max:2},
  {id:'medit',label:'Meditación',icon:'🧘',type:'weekly',goal:1},
  {id:'yoga',label:'Yoga/ejercicio',icon:'💪',type:'weekly',goal:2},
  {id:'master',label:'Máster',icon:'📚',type:'weekly',goal:3},
  {id:'cervical',label:'Estiram. cervicales',icon:'🔄',type:'weekly',goal:4},
];

let data={alcohol:{},cafe:{},medit:{},yoga:{},master:{},cervical:{},skincare:{},goals:{medit:1,yoga:2,master:3,cervical:4}};
let userEmail='',view='today',saveTimer=null,isOnline=false,statsMode='weekly';

// ── UI ──────────────────────────────────────────────────────
function showError(msg){const b=document.getElementById('errorBanner');b.textContent='⚠️ '+msg;b.style.display='block';setTimeout(()=>{b.style.display='none';},8000);}
function setSyncDot(s){document.getElementById('syncDot').style.background=s==='ok'?'#10b981':s==='saving'?'#f59e0b':'#ef4444';}

// ── Auth ────────────────────────────────────────────────────
function doLogin(){
  const email=document.getElementById('emailInput').value.trim().toLowerCase();
  if(!email||!email.includes('@'))return;
  userEmail=email;localStorage.setItem('bienestar-email',email);loadData();
}
window.onload=()=>{
  const saved=localStorage.getItem('bienestar-email');
  if(saved){userEmail=saved;document.getElementById('emailInput').value=saved;loadData();}
};

// ── Supabase ────────────────────────────────────────────────
async function loadData(){
  setSyncDot('saving');
  try{const s=localStorage.getItem('bienestar-v2');if(s)data=JSON.parse(s);}catch(e){}
  try{
    const {data:rows,error}=await sb.from('habit_data').select('*').eq('user_email',userEmail).maybeSingle();
    if(error){showError('Supabase: '+error.message);setSyncDot('error');isOnline=false;}
    else{if(rows?.data)data=JSON.parse(JSON.stringify(rows.data));isOnline=true;setSyncDot('ok');}
  }catch(e){showError('Red: '+e.message);setSyncDot('error');isOnline=false;}
  document.getElementById('login').classList.add('hidden');
  ['header','content','nav'].forEach(id=>document.getElementById(id).classList.remove('hidden'));
  document.getElementById('userEmail').textContent=userEmail+(isOnline?'':' (offline)');
  render();
}
async function saveData(){
  localStorage.setItem('bienestar-v2',JSON.stringify(data));
  if(!isOnline)return;
  setSyncDot('saving');
  try{
    const {data:ex}=await sb.from('habit_data').select('id').eq('user_email',userEmail).maybeSingle();
    if(ex?.id)await sb.from('habit_data').update({data,updated_at:new Date().toISOString()}).eq('user_email',userEmail);
    else await sb.from('habit_data').insert({user_email:userEmail,data,updated_at:new Date().toISOString()});
    setSyncDot('ok');
  }catch(e){setSyncDot('error');showError('Guardar: '+e.message);}
}
function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveData,1000);}

// ── Data helpers ────────────────────────────────────────────
function getNum(id,k){return Number(data[id]?.[k]||0);}
function getBool(id,k){return !!data[id]?.[k];}
function getSkin(k){return data.skincare?.[k]||{am:false,pm:false};}
function getGoal(id){return data.goals?.[id]||1;}

function daysInRange(start,end){
  const days=[];const cur=new Date(start);cur.setHours(0,0,0,0);
  const fin=new Date(end);fin.setHours(23,59,59,0);
  while(cur<=fin&&cur<=TODAY){days.push(localKey(new Date(cur)));cur.setDate(cur.getDate()+1);}
  return days;
}
function weekRange(offset=0){
  const ref=new Date(TODAY);ref.setDate(TODAY.getDate()+offset*7);
  const dow=ref.getDay();const diff=dow===0?-6:1-dow;
  const mon=new Date(ref);mon.setDate(ref.getDate()+diff);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  return{start:mon,end:sun};
}
function monthRange(offset=0){
  const y=TODAY.getFullYear(),m=TODAY.getMonth()+offset;
  return{start:new Date(y,m,1),end:new Date(y,m+1,0)};
}
function alcoholStreak(){
  let s=0;for(let i=0;i<365;i++){const d=new Date(TODAY);d.setDate(TODAY.getDate()-i);const k=localKey(d);if(data.alcohol?.[k]!==undefined&&Number(data.alcohol[k])===0)s++;else break;}return s;
}
function boolStreak(id){
  let s=0;for(let i=0;i<365;i++){const d=new Date(TODAY);d.setDate(TODAY.getDate()-i);if(data[id]?.[localKey(d)])s++;else break;}return s;
}
function skinStreak(){
  let s=0;for(let i=0;i<365;i++){const d=new Date(TODAY);d.setDate(TODAY.getDate()-i);const sk=getSkin(localKey(d));if(sk.am||sk.pm)s++;else break;}return s;
}

// Compute done count for weekly habits in a day range
function habitDoneCount(id,days){return days.filter(k=>data[id]?.[k]).length;}
// Skincare completeness: count days with both am+pm done
function skinDoneCount(days,mode='both'){
  return days.filter(k=>{const s=getSkin(k);if(mode==='both')return s.am&&s.pm;return s.am||s.pm;}).length;
}

// ── Navigation ──────────────────────────────────────────────
function setView(v){
  view=v;
  document.querySelectorAll('.nav-tab').forEach((t,i)=>t.classList.toggle('active',['today','stats','reto','config'][i]===v));
  render();
}
function shiftDate(delta){
  const next=new Date(activeDate);next.setDate(activeDate.getDate()+delta);
  if(next>TODAY)return;
  activeDate=next;render();
}

// ── Render ──────────────────────────────────────────────────
function render(){
  const DK=localKey(activeDate);
  const isToday=sameDay(activeDate,TODAY);
  let html='';

  // ── TODAY ──
  if(view==='today'){
    html+=`<div class="date-nav">
      <button onclick="shiftDate(-1)">‹</button>
      <div style="text-align:center;flex:1">
        <div style="font-size:15px;font-weight:600">${fmtDate(activeDate)}</div>
        <span style="font-size:11px;opacity:.5">${activeDate.getDate()} de ${MONTHS[activeDate.getMonth()]} ${activeDate.getFullYear()}</span>
      </div>
      <button onclick="shiftDate(1)" ${isToday?'disabled':''}>›</button>
    </div>`;

    // Numeric (alcohol, café)
    HABITS.filter(x=>x.type==='bad'||x.type==='limit').forEach(hb=>{
      const val=getNum(hb.id,DK),isLim=hb.type==='limit';
      let bo,bg,sc,bc;
      if(isLim){
        if(val>hb.max+2){bo='#ef4444';bg='rgba(239,68,68,0.10)';sc='#ef4444';bc='#ef4444';}
        else if(val>hb.max){bo='#f97316';bg='rgba(249,115,22,0.10)';sc='#f97316';bc='#f97316';}
        else{bo='#10b981';bg='rgba(16,185,129,0.10)';sc='#10b981';bc='#10b981';}
      }else{
        if(val>=3){bo='#ef4444';bg='rgba(239,68,68,0.10)';sc='#ef4444';bc='#ef4444';}
        else if(val>=1){bo='#f97316';bg='rgba(249,115,22,0.10)';sc='#f97316';bc='#f97316';}
        else{bo='#10b981';bg='rgba(16,185,129,0.10)';sc='#10b981';bc='#10b981';}
      }
      html+=`<div class="card" style="background:${bg};border-color:${bo}">
        <div><div style="font-size:22px">${hb.icon}</div><div style="font-weight:700;font-size:15px">${hb.label}</div><div style="font-size:13px;color:${sc}">${val} ${hb.unit}</div></div>
        <div class="stepper">
          <button class="step-btn" style="color:${bc};border-color:${bc}" onclick="changeNum('${hb.id}','${DK}',${val-1})">−</button>
          <span style="font-weight:700;font-size:17px">${val}</span>
          <button class="step-btn" style="color:#fff;background:${bc};border-color:${bc}" onclick="changeNum('${hb.id}','${DK}',${val+1})">+</button>
        </div>
      </div>`;
    });

    // Boolean weekly habits
    HABITS.filter(x=>x.type==='weekly').forEach(hb=>{
      const done=getBool(hb.id,DK);
      html+=`<div class="card" style="background:${done?'rgba(16,185,129,.1)':'rgba(255,255,255,.07)'};border-color:${done?'#10b981':'rgba(255,255,255,.12)'}" onclick="toggleBool('${hb.id}','${DK}')">
        <div><div style="font-size:22px">${hb.icon}</div><div style="font-weight:700;font-size:15px">${hb.label}</div><div style="color:${done?'#10b981':'rgba(255,255,255,.4)'};font-size:13px">${done?'✅ Hecho':'Pendiente'}</div></div>
      </div>`;
    });

    // ✨ Skincare AM/PM
    const skin=getSkin(DK);
    html+=`<div class="skin-card" style="border-color:${skin.am&&skin.pm?'#a78bfa':'rgba(255,255,255,.12)'}">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:22px">✨</span>
        <div>
          <div style="font-weight:700;font-size:15px">Skin Care</div>
          <div style="font-size:12px;color:${skin.am&&skin.pm?'#a78bfa':'rgba(255,255,255,.4)'}">
            ${skin.am&&skin.pm?'Rutina completa ✅':skin.am?'Solo mañana':skin.pm?'Solo noche':'Pendiente'}
          </div>
        </div>
      </div>
      <div class="skin-row">
        <button class="skin-btn ${skin.am?'done':''}" onclick="toggleSkin('${DK}','am')">🌅 Mañana</button>
        <button class="skin-btn ${skin.pm?'done':''}" onclick="toggleSkin('${DK}','pm')">🌙 Noche</button>
      </div>
    </div>`;

  // ── STATS ──
  }else if(view==='stats'){
    html+=`<div style="display:flex;gap:8px;padding:14px 16px 6px">
      <button onclick="statsMode='weekly';render()" style="flex:1;padding:9px;border-radius:10px;border:2px solid ${statsMode==='weekly'?'#7c3aed':'rgba(255,255,255,.15)'};background:${statsMode==='weekly'?'rgba(124,58,237,.2)':'transparent'};color:#fff;font-weight:700;cursor:pointer;font-size:14px">Semana</button>
      <button onclick="statsMode='monthly';render()" style="flex:1;padding:9px;border-radius:10px;border:2px solid ${statsMode==='monthly'?'#7c3aed':'rgba(255,255,255,.15)'};background:${statsMode==='monthly'?'rgba(124,58,237,.2)':'transparent'};color:#fff;font-weight:700;cursor:pointer;font-size:14px">Mes</button>
    </div>`;

    const cur=statsMode==='weekly'?weekRange(0):monthRange(0);
    const prev=statsMode==='weekly'?weekRange(-1):monthRange(-1);
    const curDays=daysInRange(cur.start,cur.end);
    const prevDays=daysInRange(prev.start,prev.end);
    const periodLabel=statsMode==='weekly'?'esta semana':'este mes';
    const prevLabel=statsMode==='weekly'?'semana anterior':'mes anterior';

    // ── Actividades ──
    html+=`<div class="section-label">Actividades</div>`;
    HABITS.filter(x=>x.type==='weekly').forEach(hb=>{
      const goal=getGoal(hb.id);
      const curGoal=statsMode==='weekly'?goal:Math.ceil(goal/7*curDays.length);
      const prevGoal=statsMode==='weekly'?goal:Math.ceil(goal/7*prevDays.length);
      const curDone=habitDoneCount(hb.id,curDays);
      const prevDone=habitDoneCount(hb.id,prevDays);
      const pct=curGoal>0?Math.min(Math.round(curDone/curGoal*100),100):0;
      const delta=curDone-prevDone;
      const deltaStr=delta>0?`+${delta} vs ${prevLabel}`:delta<0?`${delta} vs ${prevLabel}`:`Igual que ${prevLabel}`;
      const deltaColor=delta>=0?'#10b981':'#f97316';
      html+=`<div class="stat-card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="font-weight:700">${hb.icon} ${hb.label}</div>
          <div style="font-weight:700;font-size:18px;color:#10b981">${pct}%</div>
        </div>
        <div style="font-size:12px;opacity:.5;margin-top:2px">${curDone} de ${curGoal} ${periodLabel}</div>
        <div class="prog-bg"><div class="prog-fill" style="width:${pct}%;background:#10b981"></div></div>
        <div style="display:flex;justify-content:space-between;margin-top:8px">
          <div class="cmp-col" style="margin:0 3px 0 0">
            <div class="cmp-val" style="color:#10b981">${curDone}</div>
            <div class="cmp-label">${statsMode==='weekly'?'Esta semana':'Este mes'}</div>
          </div>
          <div class="cmp-col" style="margin:0 0 0 3px">
            <div class="cmp-val" style="color:rgba(255,255,255,.6)">${prevDone}</div>
            <div class="cmp-label">${statsMode==='weekly'?'Semana anterior':'Mes anterior'}</div>
          </div>
        </div>
        <div style="text-align:center;font-size:12px;font-weight:700;color:${deltaColor};margin-top:6px">${deltaStr}</div>
      </div>`;
    });

    // ── Skin Care stats ──
    const curSkinBoth=skinDoneCount(curDays,'both');
    const prevSkinBoth=skinDoneCount(prevDays,'both');
    const skinPct=curDays.length>0?Math.round(curSkinBoth/curDays.length*100):0;
    const skinDelta=curSkinBoth-prevSkinBoth;
    html+=`<div class="stat-card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-weight:700">✨ Skin Care completo</div>
        <div style="font-weight:700;font-size:18px;color:#a78bfa">${skinPct}%</div>
      </div>
      <div style="font-size:12px;opacity:.5;margin-top:2px">${curSkinBoth} días con AM+PM completos ${periodLabel}</div>
      <div class="prog-bg"><div class="prog-fill" style="width:${skinPct}%;background:#a78bfa"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:8px">
        <div class="cmp-col" style="margin:0 3px 0 0">
          <div class="cmp-val" style="color:#a78bfa">${curSkinBoth}</div>
          <div class="cmp-label">${statsMode==='weekly'?'Esta semana':'Este mes'}</div>
        </div>
        <div class="cmp-col" style="margin:0 0 0 3px">
          <div class="cmp-val" style="color:rgba(255,255,255,.6)">${prevSkinBoth}</div>
          <div class="cmp-label">${statsMode==='weekly'?'Semana anterior':'Mes anterior'}</div>
        </div>
      </div>
      ${skinDelta!==0?`<div style="text-align:center;font-size:12px;font-weight:700;color:${skinDelta>0?'#10b981':'#f97316'};margin-top:6px">${skinDelta>0?'+'+skinDelta:skinDelta} días completos vs ${prevLabel}</div>`:''}
    </div>`;

    // ── Consumo ──
    html+=`<div class="section-label">Consumo</div>`;
    [{id:'alcohol',icon:'🍷',label:'Alcohol',unit:'copas'},{id:'cafe',icon:'☕',label:'Café',unit:'tazas'}].forEach(hb=>{
      const curTotal=curDays.reduce((a,k)=>a+getNum(hb.id,k),0);
      const prevTotal=prevDays.reduce((a,k)=>a+getNum(hb.id,k),0);
      const avg=curDays.length>0?(curTotal/curDays.length).toFixed(1):0;
      const delta=curTotal-prevTotal;
      const deltaColor=hb.id==='alcohol'?(delta<=0?'#10b981':'#f97316'):(delta<=0?'#10b981':'#f97316');
      html+=`<div class="stat-card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="font-weight:700">${hb.icon} ${hb.label}</div>
          <div style="font-weight:700;font-size:18px">${curTotal} ${hb.unit}</div>
        </div>
        <div style="font-size:12px;opacity:.5;margin-top:2px">Media ${avg}/día ${periodLabel}</div>
        <div style="display:flex;justify-content:space-between;margin-top:8px">
          <div class="cmp-col" style="margin:0 3px 0 0">
            <div class="cmp-val">${curTotal}</div>
            <div class="cmp-label">${statsMode==='weekly'?'Esta semana':'Este mes'}</div>
          </div>
          <div class="cmp-col" style="margin:0 0 0 3px">
            <div class="cmp-val" style="color:rgba(255,255,255,.6)">${prevTotal}</div>
            <div class="cmp-label">${statsMode==='weekly'?'Semana anterior':'Mes anterior'}</div>
          </div>
        </div>
        ${delta!==0?`<div style="text-align:center;font-size:12px;font-weight:700;color:${deltaColor};margin-top:6px">${delta>0?'+'+delta:delta} ${hb.unit} vs ${prevLabel}</div>`:''}
      </div>`;
    });

  // ── RETO ──
  }else if(view==='reto'){
    html+=`<div class="section-label" style="padding-top:14px">Rachas actuales</div>`;
    const cs=alcoholStreak();
    html+=`<div class="card" style="background:${cs>0?'rgba(16,185,129,.08)':''}">
      <div><div style="font-size:16px;font-weight:700">🍷 Sin alcohol</div></div>
      <div style="color:#10b981;font-weight:800;font-size:24px">🔥 ${cs} días</div>
    </div>`;
    HABITS.filter(x=>x.type==='weekly').forEach(hb=>{
      const s=boolStreak(hb.id);
      html+=`<div class="card" style="background:${s>0?'rgba(16,185,129,.08)':''}">
        <div><div style="font-size:16px;font-weight:700">${hb.icon} ${hb.label}</div></div>
        <div style="color:#10b981;font-weight:800;font-size:24px">🔥 ${s} días</div>
      </div>`;
    });
    const ss=skinStreak();
    html+=`<div class="card" style="background:${ss>0?'rgba(167,139,250,.08)':''}">
      <div><div style="font-size:16px;font-weight:700">✨ Skin Care</div></div>
      <div style="color:#a78bfa;font-weight:800;font-size:24px">🔥 ${ss} días</div>
    </div>`;

  // ── CONFIG ──
  }else if(view==='config'){
    html+=`<div class="section-label" style="padding-top:14px">Metas semanales</div>`;
    HABITS.filter(x=>x.type==='weekly').forEach(hb=>{
      const goal=getGoal(hb.id);
      html+=`<div class="card">
        <span style="font-weight:700">${hb.icon} ${hb.label}</span>
        <button onclick="setGoal('${hb.id}',${goal})" style="padding:6px 14px;border-radius:8px;border:2px solid #10b981;background:transparent;color:#10b981;font-weight:700;cursor:pointer">${goal}/sem</button>
      </div>`;
    });
    html+=`<div class="section-label">Sincronización</div>
    <div class="stat-card" style="flex-direction:column;align-items:flex-start;gap:8px">
      <div>${isOnline?'✅ Conectado a Supabase':'❌ Offline — datos locales'}</div>
      <div style="font-size:12px;opacity:.5">${userEmail}</div>
      <button onclick="retrySync()" style="padding:6px 14px;border-radius:8px;border:2px solid #7c3aed;background:transparent;color:#a78bfa;font-weight:700;cursor:pointer">🔄 Reintentar sync</button>
    </div>
    <div class="card" style="margin-top:4px">
      <button onclick="logoutFunc()" style="width:100%;padding:12px;border:2px solid #ef4444;background:transparent;color:#ef4444;font-weight:700;cursor:pointer;border-radius:12px">Cerrar sesión</button>
    </div>`;
  }

  document.getElementById('content').innerHTML=html;
}

// ── Mutations ────────────────────────────────────────────────
function changeNum(id,dk,val){
  if(val<0)val=0;if(!data[id])data[id]={};data[id][dk]=val;scheduleSave();render();
}
function toggleBool(id,dk){
  if(!data[id])data[id]={};data[id][dk]=!getBool(id,dk);scheduleSave();render();
}
function toggleSkin(dk,slot){
  if(!data.skincare)data.skincare={};
  if(!data.skincare[dk])data.skincare[dk]={am:false,pm:false};
  data.skincare[dk][slot]=!data.skincare[dk][slot];
  scheduleSave();render();
}
function setGoal(id,cur){
  const nv=prompt('Meta semanal para '+HABITS.find(h=>h.id===id).label+':',cur);
  if(nv){if(!data.goals)data.goals={};data.goals[id]=Math.max(1,Math.min(10,parseInt(nv)||1));scheduleSave();render();}
}
async function retrySync(){isOnline=false;await loadData();}
function logoutFunc(){localStorage.removeItem('bienestar-email');location.reload();}
</script>
</body>
</html>
